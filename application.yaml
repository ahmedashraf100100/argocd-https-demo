apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: https-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ahmedashraf100100/argocd-https-demo.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-https
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

